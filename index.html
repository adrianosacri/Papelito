<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papelito</title>

<style>
body{
font-family:Arial;
background:#141024;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
}

button{
padding:12px 16px;
border-radius:10px;
border:none;
margin:5px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#ffcc33;color:black}
.success{background:#29c66f;color:black}
.danger{background:#ff4c4c;color:white}
.secondary{background:#555;color:white}
.big{font-size:22px;padding:16px 40px;background:#ff9f1a}

.list{
background:#1e1a33;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #333;
}

.code{
background:white;
color:black;
padding:3px 8px;
border-radius:20px;
font-size:12px;
}

.result{
font-size:38px;
margin:30px 0;
}

.timer{
font-size:40px;
margin-top:10px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:70px;
}

</style>
</head>

<body>

<div class="container">

<h1>Papelito</h1>

<input id="nombre" placeholder="Nombre del papelito">
<input id="r1" placeholder="Restricción 1">
<input id="r2" placeholder="Restricción 2">

<button class="primary" id="agregar">Agregar Papelito</button>

<h3>Papelitos: <span id="contador">0</span></h3>

<div id="lista" class="list"></div>

<div id="resultado" class="result"></div>

<div class="timer" id="timer">60</div>

<div>

<button class="success" id="iniciar">Iniciar Juego</button>
<button class="big" id="sacar">Sacar</button>

</div>

<div>

<button class="secondary" id="nuevo">Nuevo Round</button>
<button class="danger" id="limpiar">Limpiar</button>

</div>

<div>

<button id="sapee">Sapeee</button>
<button id="parar">Para Loquita</button>

</div>

</div>

<div id="overlay" class="overlay">
<div id="overlayText"></div>
<div id="overlayNum"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,onSnapshot,doc,setDoc,getDoc,updateDoc,deleteDoc,getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyD8EqWPqg-VGR-PUExwnqtdy_CXPBRNHGk",
authDomain:"papelito-online-fb43b.firebaseapp.com",
projectId:"papelito-online-fb43b",
storageBucket:"papelito-online-fb43b.firebasestorage.app",
messagingSenderId:"583178798392",
appId:"1:583178798392:web:c0e34238e3d6915c602dcd"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let papelitos=[]
let usados=[]

function code(){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
let s=""
for(let i=0;i<6;i++)s+=chars[Math.floor(Math.random()*chars.length)]
return s
}

function renderLista(){

document.getElementById("contador").innerText=papelitos.length

let html=""

papelitos.forEach(p=>{

html+=`
<div class="item">
<span>XXXXX</span>
<span class="code">${p.codigo}</span>
</div>
`

})

document.getElementById("lista").innerHTML=html

}

onSnapshot(collection(db,"papelitos"),snap=>{

papelitos=snap.docs.map(d=>({id:d.id,...d.data()}))
renderLista()

})

document.getElementById("agregar").onclick=async()=>{

let nombre=document.getElementById("nombre").value
let r1=document.getElementById("r1").value
let r2=document.getElementById("r2").value

if(!nombre||!r1||!r2)return

await addDoc(collection(db,"papelitos"),{

nombre,
r1,
r2,
codigo:code()

})

document.getElementById("nombre").value=""
document.getElementById("r1").value=""
document.getElementById("r2").value=""

}

document.getElementById("sacar").onclick=()=>{

let disponibles=papelitos.filter(p=>!usados.includes(p.id))

if(disponibles.length==0){

document.getElementById("resultado").innerText="No quedan papelitos"
return

}

let random=disponibles[Math.floor(Math.random()*disponibles.length)]

usados.push(random.id)

document.getElementById("resultado").innerHTML=`
<div>${random.nombre}</div>
<div style="font-size:18px;color:#ffcc33">- ${random.r1}</div>
<div style="font-size:18px;color:#ffcc33">- ${random.r2}</div>
`

}

document.getElementById("nuevo").onclick=()=>{

usados=[]
document.getElementById("resultado").innerHTML=""

}

document.getElementById("limpiar").onclick=async()=>{

let snap=await getDocs(collection(db,"papelitos"))

for(const d of snap.docs){

await deleteDoc(doc(db,"papelitos",d.id))

}

papelitos=[]
usados=[]

document.getElementById("resultado").innerHTML=""

}

let timer=60
let interval=null

function startTimer(){

timer=60
document.getElementById("timer").innerText=timer

interval=setInterval(()=>{

timer--

document.getElementById("timer").innerText=timer

if(timer==0){

clearInterval(interval)

document.getElementById("resultado").innerHTML="<div>¡Se acabó el tiempo! NEXT</div>"

setTimeout(()=>{

document.getElementById("resultado").innerHTML=""

},2000)

}

},1000)

}

document.getElementById("sapee").onclick=startTimer

document.getElementById("parar").onclick=()=>{

clearInterval(interval)

}

function countdown(text){

let overlay=document.getElementById("overlay")
let t=document.getElementById("overlayText")
let n=document.getElementById("overlayNum")

overlay.style.display="flex"

t.innerText=text

let c=3

n.innerText=c

let i=setInterval(()=>{

c--

n.innerText=c

if(c==0){

clearInterval(i)

overlay.style.display="none"

}

},1000)

}

document.getElementById("iniciar").onclick=()=>countdown("Sapeeeee")
document.getElementById("nuevo").onclick=()=>countdown("Nuevo juego")

</script>

</body>
</html>
