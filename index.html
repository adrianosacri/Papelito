<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Papelito</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:40px;
}

input{
padding:10px;
margin:5px;
width:250px;
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
}

#resultado{
font-size:40px;
margin-top:30px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Papelito</h1>

<input id="nombre" placeholder="Palabra">
<br>

<input id="r1" placeholder="Restricción 1">
<br>

<input id="r2" placeholder="Restricción 2">
<br>

<button onclick="agregar()">Agregar Papelito</button>

<br><br>

<button onclick="sacar()">Sacar</button>

<div id="resultado"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD8EqWPqg-VGR-PUExwnqtdy",
authDomain: "papelito-online-fb43b.firebaseapp.com",
projectId: "papelito-online-fb43b",
storageBucket: "papelito-online-fb43b.firebasestorage.app",
messagingSenderId: "583178798392",
appId: "1:583178798392:web:c0e34238e3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function agregar(){

let palabra=document.getElementById("nombre").value
let r1=document.getElementById("r1").value
let r2=document.getElementById("r2").value

if(!palabra)return

await addDoc(collection(db,"papelitos"),{
palabra:palabra,
r1:r1,
r2:r2
})

document.getElementById("nombre").value=""
document.getElementById("r1").value=""
document.getElementById("r2").value=""

alert("Papelito agregado")

}

async function sacar(){

const querySnapshot=await getDocs(collection(db,"papelitos"))

let lista=[]

querySnapshot.forEach((doc)=>{
lista.push(doc.data())
})

if(lista.length==0)return

let random=lista[Math.floor(Math.random()*lista.length)]

document.getElementById("resultado").innerHTML=
random.palabra+"<br>"+random.r1+"<br>"+random.r2

}

</script>

</body>
</html>
