<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papelito</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:30px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.primary{background:black;color:white;}
.secondary{background:#ddd;}
.danger{background:#c62828;color:white;}
.success{background:#2e7d32;color:white;}

.list{
background:#fafafa;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
margin-top:10px;
text-align:left;
}

.item{
padding:6px;
border-bottom:1px solid #eee;
font-weight:bold;
}

.result{
font-size:30px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Papelito</h1>

<input id="nombre" placeholder="Nombre del papelito">
<input id="r1" placeholder="Restricción 1">
<input id="r2" placeholder="Restricción 2">

<button class="primary" onclick="agregar()">Agregar Papelito</button>

<h3>Papelitos agregados: <span id="contador">0</span></h3>

<div id="lista" class="list"></div>

<br>

<button class="success" onclick="iniciar()">Iniciar Juego</button>
<button class="secondary" onclick="sacar()" id="sacarBtn" disabled>Sacar</button>
<button class="secondary" onclick="nuevoRound()">Nuevo Round</button>
<button class="danger" onclick="limpiar()">Limpiar</button>

<div id="resultado" class="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD8EqWPqg-VGR-PUExwnqtdy_CXPBRNHGk",
authDomain: "papelito-online-fb43b.firebaseapp.com",
projectId: "papelito-online-fb43b",
storageBucket: "papelito-online-fb43b.firebasestorage.app",
messagingSenderId: "583178798392",
appId: "1:583178798392:web:c0e34238e3d6915c602dcd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let papelitos=[];
let usados=[];

async function cargar(){

const snapshot=await getDocs(collection(db,"papelitos"));

papelitos=[];
snapshot.forEach(doc=>{
papelitos.push({id:doc.id,...doc.data()});
});

document.getElementById("contador").innerText=papelitos.length;

let html="";

for(let i=0;i<papelitos.length;i++){

html+=`<div class="item">XXXXX</div>`;

}

document.getElementById("lista").innerHTML=html;

}

window.agregar=async function(){

let nombre=document.getElementById("nombre").value;
let r1=document.getElementById("r1").value;
let r2=document.getElementById("r2").value;

if(!nombre||!r1||!r2)return;

await addDoc(collection(db,"papelitos"),{
nombre,
r1,
r2
});

document.getElementById("nombre").value="";
document.getElementById("r1").value="";
document.getElementById("r2").value="";

cargar();

}

window.iniciar=function(){

document.getElementById("sacarBtn").disabled=false;

}

window.sacar=function(){

let disponibles=papelitos.filter(p=>!usados.includes(p.id));

if(disponibles.length===0){

document.getElementById("resultado").innerHTML="No quedan papelitos";

return;

}

let random=disponibles[Math.floor(Math.random()*disponibles.length)];

usados.push(random.id);

document.getElementById("resultado").innerHTML=

random.nombre+
"<br>"+random.r1+
"<br>"+random.r2;

}

window.nuevoRound=function(){

usados=[];

document.getElementById("resultado").innerHTML="";

}

window.limpiar=async function(){

const snapshot=await getDocs(collection(db,"papelitos"));

for(const d of snapshot.docs){

await deleteDoc(doc(db,"papelitos",d.id));

}

papelitos=[];
usados=[];

document.getElementById("resultado").innerHTML="";

cargar();

}

cargar();

</script>

</body>
</html>
