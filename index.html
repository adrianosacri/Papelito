<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papelito</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f4f4f4;
margin:0;
padding:30px 16px;
text-align:center;
}

.container{
max-width:720px;
margin:auto;
background:white;
padding:22px 18px 30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
margin-top:0;
font-size:42px;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;
}

button{
padding:12px 16px;
margin:5px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

button:disabled{
opacity:.55;
cursor:not-allowed;
}

.primary{background:#111;color:white;}
.secondary{background:#ddd;color:#111;}
.danger{background:#c62828;color:white;}
.success{background:#2e7d32;color:white;}

.list{
background:#fafafa;
border:1px solid #ddd;
border-radius:12px;
padding:10px;
margin-top:10px;
text-align:left;
min-height:60px;
}

.item{
padding:8px 10px;
border-bottom:1px solid #eee;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.item:last-child{
border-bottom:none;
}

.code{
font-size:13px;
background:#ececec;
padding:4px 8px;
border-radius:999px;
letter-spacing:1px;
min-width:78px;
text-align:center;
}

.result{
margin-top:22px;
background:#fff8e1;
border:1px solid #f0d58a;
border-radius:16px;
padding:18px 14px;
display:none;
}

.word{
font-size:36px;
font-weight:900;
margin-bottom:14px;
word-break:break-word;
}

.rules{
color:#7b1e6b;
font-size:18px;
line-height:1.55;
font-weight:600;
}

.rules div{
margin:6px 0;
}

.countdownOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.78);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
}

.countdownBox{
background:#111;
color:white;
padding:28px 24px;
border-radius:20px;
max-width:420px;
width:100%;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,.35);
}

.countdownTitle{
font-size:24px;
font-weight:800;
margin-bottom:10px;
line-height:1.3;
}

.countdownNumber{
font-size:72px;
font-weight:900;
line-height:1;
}

.status{
margin-top:14px;
color:#666;
font-size:14px;
}

.counter{
margin:16px 0 10px;
font-size:18px;
font-weight:700;
}

.dangerText{
color:#ffb3b3;
}

.smallNote{
font-size:13px;
color:#666;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Papelito</h1>

<input id="nombre" placeholder="Nombre del papelito">
<input id="r1" placeholder="Restricción 1">
<input id="r2" placeholder="Restricción 2">

<button class="primary" onclick="agregar()">Agregar Papelito</button>

<div class="counter">Papelitos agregados: <span id="contador">0</span></div>

<div id="lista" class="list">
<div class="status">Todavía no hay papelitos.</div>
</div>

<div class="smallNote">Los papelitos se muestran ocultos, pero con un código único para validar que sí fueron agregados.</div>

<br>

<button class="success" onclick="iniciar()">Iniciar Juego</button>
<button class="secondary" onclick="sacar()" id="sacarBtn" disabled>Sacar</button>
<button class="secondary" onclick="nuevoRound()">Nuevo Round</button>
<button class="danger" onclick="limpiar()">Limpiar</button>

<div id="resultado" class="result">
  <div id="palabraMostrada" class="word"></div>
  <div id="restriccionesMostradas" class="rules"></div>
</div>

<div id="estado" class="status">Agrega papelitos y luego inicia el juego.</div>

</div>

<div id="countdownOverlay" class="countdownOverlay">
  <div class="countdownBox">
    <div id="countdownTitle" class="countdownTitle"></div>
    <div id="countdownNumber" class="countdownNumber"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD8EqWPqg-VGR-PUExwnqtdy_CXPBRNHGk",
authDomain: "papelito-online-fb43b.firebaseapp.com",
projectId: "papelito-online-fb43b",
storageBucket: "papelito-online-fb43b.firebasestorage.app",
messagingSenderId: "583178798392",
appId: "1:583178798392:web:c0e34238e3d6915c602dcd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let papelitos = [];
let usados = [];
let juegoIniciado = false;

const contador = document.getElementById("contador");
const lista = document.getElementById("lista");
const sacarBtn = document.getElementById("sacarBtn");
const resultado = document.getElementById("resultado");
const palabraMostrada = document.getElementById("palabraMostrada");
const restriccionesMostradas = document.getElementById("restriccionesMostradas");
const estado = document.getElementById("estado");

const countdownOverlay = document.getElementById("countdownOverlay");
const countdownTitle = document.getElementById("countdownTitle");
const countdownNumber = document.getElementById("countdownNumber");

function generarCodigo() {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let code = "";
  for (let i = 0; i < 6; i++) {
    code += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return code;
}

function generarCodigoUnico() {
  const existentes = new Set(papelitos.map(p => p.codigo));
  let nuevo = generarCodigo();
  while (existentes.has(nuevo)) {
    nuevo = generarCodigo();
  }
  return nuevo;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function mostrarCountdown(titulo, numeroFinal = 1, danger = false) {
  countdownTitle.innerHTML = titulo;
  countdownTitle.className = danger ? "countdownTitle dangerText" : "countdownTitle";
  countdownOverlay.style.display = "flex";

  for (let i = 3; i >= numeroFinal; i--) {
    countdownNumber.textContent = i;
    await sleep(800);
  }

  countdownOverlay.style.display = "none";
}

async function cargar() {
  const snapshot = await getDocs(collection(db, "papelitos"));

  papelitos = [];
  snapshot.forEach(d => {
    papelitos.push({ id: d.id, ...d.data() });
  });

  contador.innerText = papelitos.length;

  if (papelitos.length === 0) {
    lista.innerHTML = `<div class="status">Todavía no hay papelitos.</div>`;
    return;
  }

  let html = "";
  for (let i = 0; i < papelitos.length; i++) {
    html += `
      <div class="item">
        <span>XXXXX</span>
        <span class="code">${papelitos[i].codigo || "SINCOD"}</span>
      </div>
    `;
  }

  lista.innerHTML = html;
}

window.agregar = async function() {
  let nombre = document.getElementById("nombre").value.trim();
  let r1 = document.getElementById("r1").value.trim();
  let r2 = document.getElementById("r2").value.trim();

  if (!nombre || !r1 || !r2) {
    alert("Completa el nombre del papelito y las 2 restricciones.");
    return;
  }

  if (juegoIniciado) {
    alert("El juego ya empezó. Ya no se pueden agregar más papelitos.");
    return;
  }

  const codigo = generarCodigoUnico();

  await addDoc(collection(db, "papelitos"), {
    nombre,
    r1,
    r2,
    codigo
  });

  document.getElementById("nombre").value = "";
  document.getElementById("r1").value = "";
  document.getElementById("r2").value = "";

  await cargar();
  estado.innerText = "Papelito agregado correctamente.";
};

window.iniciar = async function() {
  if (papelitos.length === 0) {
    alert("Primero agrega al menos un papelito.");
    return;
  }

  await mostrarCountdown("El juego empieza en...", 1, false);

  juegoIniciado = true;
  sacarBtn.disabled = false;
  estado.innerText = "Juego iniciado. Ya puedes sacar papelitos.";
};

window.sacar = function() {
  if (!juegoIniciado) {
    alert("Primero inicia el juego.");
    return;
  }

  let disponibles = papelitos.filter(p => !usados.includes(p.id));

  if (disponibles.length === 0) {
    resultado.style.display = "block";
    palabraMostrada.innerHTML = "No quedan papelitos";
    restriccionesMostradas.innerHTML = `<div>- Presiona "Nuevo Round" para volver a empezar</div>`;
    estado.innerText = "Se terminaron todos los papelitos.";
    return;
  }

  let random = disponibles[Math.floor(Math.random() * disponibles.length)];
  usados.push(random.id);

  resultado.style.display = "block";
  palabraMostrada.innerHTML = random.nombre;
  restriccionesMostradas.innerHTML = `
    <div>- ${random.r1}</div>
    <div>- ${random.r2}</div>
  `;

  estado.innerText = `Papelitos restantes: ${papelitos.length - usados.length}`;
};

window.nuevoRound = async function() {
  if (papelitos.length === 0) {
    alert("No hay papelitos guardados.");
    return;
  }

  await mostrarCountdown("Nuevo juego en...", 1, false);

  usados = [];
  juegoIniciado = true;
  sacarBtn.disabled = false;
  resultado.style.display = "none";
  palabraMostrada.innerHTML = "";
  restriccionesMostradas.innerHTML = "";
  estado.innerText = "Nuevo round iniciado.";
};

window.limpiar = async function() {
  await mostrarCountdown("⚠️ Se borrará absolutamente todo en...", 1, true);

  const snapshot = await getDocs(collection(db, "papelitos"));

  for (const d of snapshot.docs) {
    await deleteDoc(doc(db, "papelitos", d.id));
  }

  papelitos = [];
  usados = [];
  juegoIniciado = false;

  resultado.style.display = "none";
  palabraMostrada.innerHTML = "";
  restriccionesMostradas.innerHTML = "";
  sacarBtn.disabled = true;
  estado.innerText = "Todo fue eliminado.";

  await cargar();
};

await cargar();

</script>

</body>
</html>
